server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/TeamDoubleO/config-repo
          username: ${GIT_USERNAME}
          password: ${GIT_TOKEN}
          default-label: develop
          search-paths:
            - member-service
            - admin-service
            - hospital-service
            - did-service
            - pass-service
            - patient-service
            - api-gateway
            - service-discovery
    bus:
      enabled: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

management:
  endpoints:
    web:
      exposure:
        include: busrefresh,health,info
